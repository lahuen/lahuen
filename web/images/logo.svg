<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170 50" width="170" height="50">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Alkatra:wght@700&amp;display=swap');
    </style>
  </defs>

  <!-- "Lahuen" text -->
  <text x="10" y="37" font-family="'Alkatra', cursive, serif" font-weight="700" font-size="32"
        fill="#ffffff" letter-spacing="0.5">Lahuen</text>

  <!-- Leaves sprouting from the "h" (positioned at the h ascender) -->
  <g transform="translate(72, 14)">
    <!-- Left leaf -->
    <path d="M0,0 C-3,-5 -8,-13 -16,-18 C-17,-12 -14,-4 -8,0 C-5,1 -2,1 0,0Z" fill="#ffffff"/>
    <path d="M-1,0 C-5,-5 -10,-11 -16,-18" stroke="#ffffff" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.6"/>
    <!-- Right leaf -->
    <path d="M0,0 C3,-5 8,-13 16,-18 C17,-12 14,-4 8,0 C5,1 2,1 0,0Z" fill="#ffffff" opacity="0.85"/>
    <path d="M1,0 C5,-5 10,-11 16,-18" stroke="#ffffff" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.6"/>
    <!-- Tiny sprout -->
    <path d="M0,0 C-0.5,-4 -0.3,-7 0,-10 C0.3,-7 0.5,-4 0,0Z" fill="#ffffff" opacity="0.5"/>
  </g>
</svg>
    <path d="M178,94 C178,82 176,66 178,50 C180,40 180,32 182,26" stroke="#4a8c3f" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M188,94 C190,84 188,70 190,56 C192,46 192,38 194,32" stroke="#509540" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.8"/>
    <path d="M196,94 C196,86 194,74 196,62 C198,52 198,44 200,38" stroke="#448838" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.7"/>

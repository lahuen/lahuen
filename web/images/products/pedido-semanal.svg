    <circle cx="202" cy="129" r="1.2" fill="#8a7a55" opacity="0.6"/>
    <circle cx="208" cy="129" r="1.2" fill="#8a7a55" opacity="0.6"/>
    <circle cx="214" cy="129" r="1.2" fill="#8a7a55" opacity="0.6"/>
    <circle cx="202" cy="135" r="1.2" fill="#8a7a55" opacity="0.6"/>
    <circle cx="208" cy="135" r="1.2" fill="#8a7a55" opacity="0.6"/>
    <circle cx="214" cy="135" r="1.2" fill="#8a7a55" opacity="0.6"/>
    <!-- Calendar header tabs -->
    <path d="M203,114 L203,110" stroke="#8a7a55" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M213,114 L213,110" stroke="#8a7a55" stroke-width="1.2" stroke-linecap="round"/>
  </g>
</svg>
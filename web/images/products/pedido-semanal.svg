    <!-- Arugula leaf (center) -->
    <path d="M156,94 C154,84 152,70 150,56 C148,50 150,46 154,48 C156,52 156,60 154,68 C152,62 150,62 152,66 C156,68 158,64 158,60 C160,66 158,76 156,86 C156,90 156,92 156,94Z" fill="#4e9842" stroke="#3c7a30" stroke-width="0.9" stroke-linecap="round"/>

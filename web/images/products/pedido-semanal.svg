    <path d="M84,118 C100,116 130,115 150,115 C170,115 200,116 216,118" stroke="#c4b080" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M84,136 C100,134 130,133 150,133 C170,133 200,134 216,136" stroke="#c4b080" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M84,152 C100,150 130,149 150,149 C170,149 200,150 216,152" stroke="#c4b080" stroke-width="1.2" fill="none" stroke-linecap="round"/>

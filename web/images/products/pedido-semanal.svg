    <path d="M210,96 C212,90 216,82 218,76 C220,72 218,70 214,72 C212,74 212,80 212,86 C212,90 210,94 210,96Z" fill="#509642" stroke="#38702e" stroke-width="0.8" stroke-linecap="round" opacity="0.75"/>

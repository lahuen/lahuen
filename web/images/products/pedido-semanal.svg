<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <filter id="sketchy-ps">
      <feTurbulence type="turbulence" baseFrequency="0.025" numOctaves="3" result="noise" seed="40"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#sketchy-ps)">
    <!-- Wooden crate - hand-drawn box shape -->

    <path d="M118,94 C122,86 126,76 122,66 C120,60 114,58 110,60 C116,64 120,72 118,80 C116,86 118,92 118,94Z" fill="#82c86e" stroke="#5a8a4a" stroke-width="1" stroke-linecap="round"/>
    <path d="M110,92 C108,86 106,76 108,68 C110,64 112,62 114,64 C116,68 114,76 112,82 C110,86 110,90 110,92Z" fill="#98d88a" stroke="#6aa85a" stroke-width="0.8" stroke-linecap="round"/>

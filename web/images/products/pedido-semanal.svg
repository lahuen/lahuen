    <path d="M82,102 C84,100 100,98 150,97 C200,98 216,100 218,102 L218,158 C216,160 200,162 150,163 C100,162 84,160 82,158Z" fill="#d8c8a0" stroke="#b5a06a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180" width="800" height="360">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Alkatra:wght@400;700&amp;display=swap');
    </style>
  </defs>

  <!-- "Lahuen" text -->
  <text x="200" y="80" font-family="'Alkatra', cursive, serif" font-weight="700" font-size="68"
        fill="#3a6b35" text-anchor="middle" letter-spacing="1">Lahuen</text>

  <!-- Teardrop leaves sprouting from the "h" -->
  <g transform="translate(188, 38)">
    <!-- Left leaf - teardrop shape curving up-left -->
    <path d="M0,3 C-3,-4 -8,-12 -13,-20 C-15,-24 -18,-25 -19,-22 C-20,-17 -16,-7 -10,-1 C-7,1 -3,3 0,3Z" fill="#4a8c3f"/>
    <path d="M-1,1 C-5,-5 -10,-13 -15,-22" stroke="#3a6b35" stroke-width="1" fill="none" stroke-linecap="round"/>

    <!-- Right leaf - teardrop shape curving up-right -->
    <path d="M0,3 C3,-4 8,-12 13,-20 C15,-24 18,-25 19,-22 C20,-17 16,-7 10,-1 C7,1 3,3 0,3Z" fill="#5aa84a"/>
    <path d="M1,1 C5,-5 10,-13 15,-22" stroke="#3a6b35" stroke-width="1" fill="none" stroke-linecap="round"/>

    <!-- Center sprout -->
    <path d="M0,3 C-0.4,-2 -0.2,-7 0,-13 C0.2,-7 0.4,-2 0,3Z" fill="#5aa84a" opacity="0.55"/>
  </g>

  <!-- "Hidroponía Viva" subtitle -->
  <text x="200" y="115" font-family="'Alkatra', cursive, serif" font-weight="400" font-size="28"
        fill="#5a7a50" text-anchor="middle" letter-spacing="1.5" font-style="italic">Hidroponía Viva</text>

  <line x1="115" y1="127" x2="285" y2="127" stroke="#d4c5a0" stroke-width="1.5" opacity="0.5"/>

  <text x="200" y="150" font-family="'Outfit', 'Helvetica Neue', sans-serif" font-weight="400" font-size="13"
        fill="#7a8a70" text-anchor="middle" letter-spacing="3">LECHUGA HIDROPÓNICA · SIN AGROQUÍMICOS</text>
</svg>